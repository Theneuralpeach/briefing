<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Morning Briefing</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Briefing" />
<meta name="theme-color" content="#FBF7F0" />
<link rel="apple-touch-icon" href="./icon.svg" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FBF7F0; --card:#FFFFFF; --ink:#2A2620; --muted:#8A8378; --hair:rgba(42,38,32,.10);
    --amber:#BA7517; --amber-ink:#633806;
    --pink-bg:#FBEAF0; --pink-ink:#72243E; --pink-deep:#4B1528;
    --hi:#D85A30; --warn:#BA7517;
    --serif:'DM Serif Display',Georgia,serif; --sans:'Inter',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding:max(20px,env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom))}
  .wrap{max-width:440px;margin:0 auto}
  .date{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .date .sun{color:var(--amber);font-size:16px}
  h1{font-family:var(--serif);font-weight:400;font-size:30px;line-height:1.2;margin:8px 0 2px}
  .label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:0 0 10px}
  section{margin-top:26px}
  .win{display:flex;gap:10px;align-items:flex-start;margin:0 0 11px;font-size:15px;line-height:1.5}
  .win .dot{color:var(--amber);flex:none;margin-top:1px}
  .energy{background:var(--pink-bg);border-radius:18px;padding:18px 20px;margin-top:22px}
  .energy .meta{display:flex;align-items:center;gap:8px;color:var(--pink-ink);font-size:13px;margin-bottom:10px}
  .energy p{margin:0 0 12px;color:var(--pink-deep);font-size:13.5px;line-height:1.65}
  .energy .affirm{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.5;margin:0}
  .quiet{color:var(--muted);font-size:13.5px;line-height:1.65}
  .mail{display:flex;gap:11px;align-items:flex-start;margin:0 0 13px}
  .mail .pri{width:9px;height:9px;border-radius:50%;flex:none;margin-top:6px;background:var(--hi)}
  .mail .pri.med{background:var(--warn)}
  .mail .who{font-size:15px;line-height:1.4}
  .mail .sub{font-size:12.5px;color:var(--muted);line-height:1.4}
  .taskgroup{margin:0 0 14px}
  .taskgroup h3{font-size:13px;font-weight:500;margin:0 0 7px;color:var(--ink)}
  .task{display:flex;gap:9px;align-items:flex-start;font-size:14px;line-height:1.45;margin:0 0 7px;color:var(--ink)}
  .task .box{width:15px;height:15px;border:1.5px solid var(--hair);border-radius:5px;flex:none;margin-top:2px}
  .diary{margin-top:26px;background:var(--card);border:.5px solid var(--hair);border-radius:18px;padding:18px 20px}
  .diary h3{font-family:var(--serif);font-weight:400;font-size:19px;margin:0 0 4px}
  .diary .q{font-size:14px;color:var(--ink);margin:10px 0 0;line-height:1.5}
  .diary .hint{font-size:12.5px;color:var(--muted);margin-top:4px}
  .memo{margin-top:18px;background:var(--card);border:.5px solid var(--hair);border-radius:18px;padding:18px 20px}
  .memo h3{font-family:var(--serif);font-weight:400;font-size:19px;margin:0 0 4px}
  .memo .hint{font-size:12.5px;color:var(--muted);margin:0 0 12px}
  .memo textarea{width:100%;border:1px solid var(--hair);border-radius:12px;padding:12px 14px;font-size:16px;font-family:var(--sans);color:var(--ink);background:var(--bg);resize:vertical;line-height:1.5}
  .memo button{margin-top:10px;width:100%;height:44px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:15px;font-family:var(--sans);font-weight:500}
  .memo button:disabled{opacity:.45}
  .memo-status{font-size:13px;margin-top:10px;min-height:18px;color:var(--muted)}
  .memo .sub{font-size:14px;font-weight:500;margin:0 0 4px;color:var(--ink)}
  .memo-btn{display:block;text-align:center;text-decoration:none;margin-top:6px;padding:14px;border-radius:12px;background:var(--ink);color:#fff;font-size:15px;font-weight:500}
  .foot{margin-top:30px;text-align:center;color:var(--muted);font-size:11.5px;line-height:1.6}
  .sample{display:inline-block;background:#FAEEDA;color:var(--amber-ink);font-size:11px;padding:3px 10px;border-radius:20px;margin-top:10px}
  #lock{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;z-index:9}
  #lock .box{max-width:340px;width:100%;text-align:center}
  #lock .sun{font-size:34px;color:var(--amber)}
  #lock h2{font-family:var(--serif);font-weight:400;font-size:24px;margin:14px 0 6px}
  #lock p{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 18px}
  #lock input{width:100%;height:46px;border:1px solid var(--hair);border-radius:12px;padding:0 14px;font-size:16px;font-family:var(--sans);background:var(--card);color:var(--ink)}
  #lock button{margin-top:12px;width:100%;height:46px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-size:15px;font-family:var(--sans);font-weight:500}
  #lock .err{color:#A32D2D;font-size:13px;margin-top:10px;min-height:18px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="date"><span class="sun">☀</span><span id="date">—</span></div>
  <h1 id="greeting">おはよう、Monica</h1>
  <div id="sample-badge"></div>

  <section id="wins-sec"><p class="label">今日の勝ち筋</p><div id="wins"></div></section>

  <div class="energy">
    <div class="meta"><span>🌙</span><span id="moon-cycle">—</span></div>
    <p id="energy-note">—</p>
    <p class="affirm" id="affirmation">—</p>
  </div>

  <section><p class="label">今ネットで人気のことば</p><p class="quiet" id="popular">—</p></section>
  <section><p class="label">🧠 今日知っておくこと</p><p class="quiet" id="neuro">—</p></section>
  <section><p class="label">🗓 今日の予定</p><p class="quiet" id="schedule">—</p></section>
  <section id="emails-sec"><p class="label">📧 要返信メール</p><div id="emails"></div></section>
  <section id="tasks-sec"><p class="label">✅ 今日のタスク</p><div id="tasks"></div></section>
  <section id="dec-sec"><p class="label">🚨 モニカにしか決められないこと</p><div id="decisions" class="quiet"></div></section>

  <div class="foot"><span id="updated">—</span><br/><span id="sample-foot"></span></div>

  <div class="memo" style="margin-top:28px">
    <h3>🌙 おやすみ（夜の記録）</h3>

    <p class="sub">📔 今日の日記</p>
    <p class="hint">睡眠・食べたもの・誰と何した・体調・薬… 自由に。今日はどんな日だった？</p>
    <textarea id="diary" rows="4" placeholder="今日はどうだった？"></textarea>
    <button id="diary-send">日記を送る</button>
    <div class="memo-status" id="diary-status"></div>

    <p class="sub" style="margin-top:20px">💭 思いついたこと</p>
    <p class="hint">いつでも書いてOK。あとでClaudeに「アプリメモ見て」で一緒に育てられる。</p>
    <textarea id="memo" rows="3" placeholder="いま思いついたこと…"></textarea>
    <button id="memo-send">メモを送る</button>
    <div class="memo-status" id="memo-status"></div>
  </div>
</div>

<div id="lock">
  <div class="box">
    <div class="sun">🌅</div>
    <h2>おはよう、Monica</h2>
    <p>合言葉を入れてね。一度だけ。<br>これでこの端末だけがbriefingを読めるようになる。</p>
    <input id="pass" type="password" inputmode="text" autocomplete="off" placeholder="合言葉" />
    <button id="unlock">ひらく</button>
    <div class="err" id="err"></div>
  </div>
</div>

<script>
function el(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
function render(d){
  el('date').textContent=d.date||'';
  if(d.greeting)el('greeting').textContent=d.greeting;
  if(d.sample){el('sample-badge').innerHTML='<span class="sample">サンプル表示</span>';el('sample-foot').textContent='これはデザイン確認用のサンプルです。';}
  el('wins').innerHTML=(d.wins||[]).map(w=>'<div class="win"><span class="dot">◆</span><span>'+esc(w)+'</span></div>').join('')||'<p class="quiet">—</p>';
  el('moon-cycle').textContent=[d.moon,d.cycle].filter(Boolean).join(' · ');
  el('energy-note').textContent=d.energy||'';
  el('affirmation').textContent=d.affirmation?('「'+d.affirmation+'」'):'';
  el('popular').textContent=d.popular||'';
  el('neuro').textContent=d.neuro||'';
  el('schedule').textContent=d.schedule||'';
  el('emails').innerHTML=(d.emails||[]).map(m=>'<div class="mail"><span class="pri '+(m.p==='med'?'med':'')+'"></span><span><span class="who">'+esc(m.who)+' — '+esc(m.what)+'</span><br><span class="sub">'+esc(m.action)+'</span></span></div>').join('')||'<p class="quiet">要返信なし</p>';
  var t=d.tasks||{},th='';
  Object.keys(t).forEach(function(k){var arr=t[k]||[];if(!arr.length)return;th+='<div class="taskgroup"><h3>'+esc(k)+'</h3>'+arr.map(x=>'<div class="task"><span class="box"></span><span>'+esc(x)+'</span></div>').join('')+'</div>';});
  el('tasks').innerHTML=th||'<p class="quiet">—</p>';
  el('decisions').innerHTML=(d.decisions||[]).map(x=>esc(x)).join('<br>')||'—';
  el('updated').textContent=d.updated?('更新: '+d.updated):'';
}
async function decrypt(blob,pass){
  var salt=b64d(blob.salt),iv=b64d(blob.iv),data=b64d(blob.ct);
  var base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,data);
  return JSON.parse(new TextDecoder().decode(pt));
}
function showLock(msg){el('lock').style.display='flex';el('err').textContent=msg||'';}
var BLOB=null;
async function tryPass(pass,save){
  try{var d=await decrypt(BLOB,pass);if(save)localStorage.setItem('bpass',pass);el('lock').style.display='none';render(d);}
  catch(e){showLock('合言葉が違うみたい。もう一度。');localStorage.removeItem('bpass');}
}
el('unlock').onclick=function(){var p=el('pass').value;if(p)tryPass(p,true);};
el('pass').addEventListener('keydown',function(e){if(e.key==='Enter')el('unlock').click();});
var NOTES_API="https://briefing.theneuralpeach.deno.net";
(function(){
  function wire(taId,btnId,stId,kind,okMsg){
    var btn=el(btnId),ta=el(taId),st=el(stId);
    if(!btn)return;
    btn.onclick=function(){
      var note=(ta.value||'').trim();if(!note){return;}
      btn.disabled=true;st.textContent='送ってる…';
      fetch(NOTES_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:note,kind:kind,secret:localStorage.getItem('bpass')||''})})
        .then(function(r){return r.json();}).then(function(o){
          btn.disabled=false;
          if(o&&o.ok){ta.value='';st.textContent=okMsg;}
          else{st.textContent='うまく送れなかった: '+((o&&o.error)||'?');}
        }).catch(function(){btn.disabled=false;st.textContent='送れなかった（通信エラー）';});
    };
  }
  wire('diary','diary-send','diary-status','diary','日記を送ったよ ✓ Notionに届いた');
  wire('memo','memo-send','memo-status','memo','送ったよ ✓ あとでClaudeに「アプリメモ見て」');
})();
fetch('./data/today.json?_='+Date.now()).then(r=>r.json()).then(function(d){
  if(d&&d.enc){BLOB=d;var saved=localStorage.getItem('bpass');if(saved)tryPass(saved,false);else showLock('');}
  else render(d);
}).catch(function(){el('greeting').textContent='読み込めませんでした';});
</script>
</body>
</html>
